<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Portal v2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f1f3f4;
color:#202124;
transition:0.3s;
}

.dark{
background:#1e1e1e;
color:white;
}

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
width:320px;
text-align:center;
}

.dark .login-box{
background:#2b2b2b;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#f1f3f4;
}

.dark input{
background:#444;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1a73e8;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:0.9;
}

#portal{
display:none;
}

header{
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.dark header{
background:#2b2b2b;
}

.container{
display:grid;
grid-template-columns:240px 1fr;
height:calc(100vh - 70px);
}

.sidebar{
background:white;
padding:20px;
}

.dark .sidebar{
background:#2b2b2b;
}

.sidebar button{
margin-bottom:12px;
}

.main{
padding:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.dark .card{
background:#2b2b2b;
}

.card:hover{
transform:translateY(-5px);
}

#secret{
position:fixed;
bottom:8px;
right:10px;
opacity:0.08;
font-size:22px;
cursor:pointer;
}

#loading{
position:fixed;
inset:0;
background:#1a73e8;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
z-index:999;
}
</style>
</head>

<body>

<div id="loading">Loading Portal...</div>

<div id="loginPage">
<div class="login-box">
<h2>Study Portal</h2>
<input type="text" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>
</div>

<div id="portal">

<header>
<h2>Study Portal</h2>
<button onclick="toggleDark()">Dark Mode</button>
</header>

<div class="container">

<div class="sidebar">
<button onclick="go('https://classroom.google.com')">Classroom</button>
<button onclick="go('https://docs.google.com')">Docs</button>
<button onclick="go('https://drive.google.com')">Drive</button>
<button onclick="go('https://youtube.com')">Tutorials</button>
</div>

<div class="main">

<div class="card" onclick="go('https://classroom.google.com')">
<h3>Assignments</h3>
<p>View homework tasks.</p>
</div>

<div class="card" onclick="go('https://bbc.co.uk/bitesize')">
<h3>Revision</h3>
<p>Study for tests.</p>
</div>

<div class="card" onclick="go('https://docs.google.com')">
<h3>Notes</h3>
<p>Create documents.</p>
</div>

<div class="card" onclick="go('https://youtube.com')">
<h3>Tutorials</h3>
<p>Watch helpful videos.</p>
</div>

</div>
</div>

</div>

<div id="secret" onclick="go('secret.html')">•</div>

<script>
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2000);

function login(){
let p=document.getElementById("pass").value;

if(p==="1234"){
document.getElementById("loginPage").style.display="none";
document.getElementById("portal").style.display="block";
}else{
document.getElementById("msg").innerText="Wrong password";
}
}

function go(url){
window.location.href=url;
}

function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>

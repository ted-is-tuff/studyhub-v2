<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Access</title>

<style>
body{
margin:0;
background:black;
color:#00ff66;
font-family:Courier New, monospace;
overflow:hidden;
text-align:center;
}

#screen{
padding-top:80px;
}

h1{
font-size:42px;
text-shadow:0 0 10px #00ff66;
}

p{
font-size:18px;
opacity:0.8;
}

input{
padding:12px;
width:240px;
background:#111;
border:1px solid #00ff66;
color:#00ff66;
font-size:18px;
margin-top:20px;
}

button{
padding:12px 24px;
margin-top:15px;
background:#00ff66;
border:none;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

#msg{
margin-top:15px;
height:20px;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
opacity:0.15;
white-space:pre;
font-size:18px;
line-height:18px;
}
</style>
</head>

<body>

<div id="matrix"></div>

<div id="screen">
<h1>ACCESS TERMINAL</h1>
<p>Restricted Area</p>

<input type="password" id="pass" placeholder="Enter Code">
<br>
<button onclick="unlock()">ENTER</button>

<div id="msg"></div>
</div>

<script>
function unlock(){
let pass = document.getElementById("pass").value;

if(pass === "shadow"){
document.getElementById("msg").innerHTML="ACCESS GRANTED";
setTimeout(()=>{
window.location.href="https://riddles.bull.installgentoo.com/";
},1500);
}else{
document.getElementById("msg").innerHTML="ACCESS DENIED";
}
}

let chars="01";
let output="";
for(let i=0;i<1500;i++){
output += chars[Math.floor(Math.random()*chars.length)];
if(i%100===0) output+="<br>";
}
document.getElementById("matrix").innerHTML=output;
</script>

</body>
</html>
